name: Discover RIS Relations

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      meeting_limit:
        description: Number of recent meetings to sample
        required: true
        default: "3"
      item_limit:
        description: Number of meeting items/documents to fetch per meeting
        required: true
        default: "10"
      meeting_ids:
        description: Optional comma-separated meeting IDs to probe directly
        required: false
        default: ""
      scan_limit:
        description: Number of meeting/session records to scan when searching for populated meetings
        required: true
        default: "100"
      commit_report:
        description: Commit discovery report to data/public/quality
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run relation discovery
        run: |
          python -m open_ris_monitor.analysis.gemeenteoplossingen_relation_discovery \
            --municipality "${{ inputs.municipality }}" \
            --meeting-limit "${{ inputs.meeting_limit }}" \
            --item-limit "${{ inputs.item_limit }}" \
            --meeting-ids "${{ inputs.meeting_ids }}" \
            --scan-limit "${{ inputs.scan_limit }}" \
            --output data/public/quality/gemeenteoplossingen_relation_discovery.json

      - name: Show discovery output
        run: |
          cat data/public/quality/gemeenteoplossingen_relation_discovery.json

      - name: Upload relation discovery report
        uses: actions/upload-artifact@v4
        with:
          name: ris-relation-discovery-${{ inputs.municipality }}
          path: data/public/quality/gemeenteoplossingen_relation_discovery.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit discovery report
        if: ${{ inputs.commit_report == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/quality/gemeenteoplossingen_relation_discovery.json
          git diff --cached --quiet || git commit -m "Update GemeenteOplossingen relation discovery report"
          git push
