name: Issue 15 Site Preview

on:
  workflow_dispatch:
  push:
    branches:
      - issue-15-meeting-document-relations
    paths:
      - "site/**"
      - "data/public/**"
      - ".github/workflows/issue-15-site-preview.yml"

jobs:
  preview:
    name: Package static site preview
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: issue-15-meeting-document-relations

      - name: Prepare preview directory
        run: |
          mkdir -p preview
          cp -R site preview/site
          cp -R data preview/data

      - name: Add preview README
        run: |
          cat > preview/README.txt <<'TXT'
          Open RIS Monitor site preview

          Download and unzip this artifact.

          Contents:
          - preview/site/
          - preview/data/public/
          - relation-aware viewer code from the feature branch
          - relation-aware public data from the feature branch

          Open preview/site/index.html in a browser.

          Note:
          Some browsers block local fetch calls from file:// URLs.
          If the page opens but data does not load, use a simple local static server.
          For example, from the unzipped preview directory:

              python -m http.server 8000

          Then open:

              http://localhost:8000/site/index.html
          TXT

      - name: Show preview contents
        run: |
          echo "Preview files:"
          find preview -maxdepth 4 -type f | sort | head -n 200

          echo ""
          echo "Public data files:"
          ls -la preview/data/public || true

          echo ""
          echo "latest.json:"
          cat preview/data/public/latest.json || true

      - name: Validate relation preview files exist
        run: |
          test -f preview/site/index.html
          test -f preview/site/assets/app.js
          test -f preview/data/public/latest.json
          test -f preview/data/public/documents.jsonl
          test -f preview/data/public/meetings.jsonl
          test -f preview/data/public/meeting_items.jsonl
          test -f preview/data/public/meeting_documents.jsonl
          test -f preview/data/public/meeting_item_documents.jsonl

      - name: Upload site preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: issue-15-site-preview
          path: preview
