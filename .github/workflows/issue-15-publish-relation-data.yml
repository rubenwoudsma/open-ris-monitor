name: Issue 15 Publish Relation Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Generate and commit relation public data
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: issue-15-meeting-document-relations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install requests

      - name: Run relation-aware harvest
        run: |
          python -m open_ris_monitor.pipeline.run \
            --municipality huizen \
            --mode latest \
            --limit 10 \
            --include-relations \
            --meeting-scan-limit 50 \
            --meeting-session-batch-size 50 \
            --meeting-item-limit 200

      - name: Show generated public files
        run: |
          ls -la data/public
          echo ""
          cat data/public/latest.json
          echo ""
          wc -l data/public/meetings.jsonl
          wc -l data/public/meeting_items.jsonl
          wc -l data/public/meeting_documents.jsonl
          wc -l data/public/meeting_item_documents.jsonl

      - name: Commit generated public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/public/latest.json \
            data/public/documents.jsonl \
            data/public/document_versions.jsonl \
            data/public/harvest_runs.jsonl \
            data/public/meetings.jsonl \
            data/public/meeting_items.jsonl \
            data/public/meeting_documents.jsonl \
            data/public/meeting_item_documents.jsonl

          if git diff --cached --quiet; then
            echo "No public data changes to commit."
          else
            git commit -m "Update public RIS data with meeting relations"
            git push origin HEAD:issue-15-meeting-document-relations
          fi
