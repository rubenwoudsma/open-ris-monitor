name: Harvest

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      mode:
        description: Harvest mode, latest or full
        required: true
        default: latest
        type: choice
        options:
          - latest
          - full
      limit:
        description: Number of latest documents to fetch in latest mode
        required: true
        default: "25"
      batch_size:
        description: Batch size for full harvest
        required: true
        default: "100"
      max_documents:
        description: Maximum documents for full harvest, leave empty for all
        required: false
        default: ""
      enrich_checksums:
        description: Temporarily download selected PDFs and calculate SHA-256 checksums
        required: true
        default: false
        type: boolean
      checksum_max_documents:
        description: Maximum documents to checksum in this run
        required: true
        default: "50"
      commit_public:
        description: Commit generated data/public output back to the branch
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run harvest and public export
        run: |
          MAX_DOCUMENTS_ARG=""
          if [ -n "${{ inputs.max_documents }}" ]; then
            MAX_DOCUMENTS_ARG="--max-documents ${{ inputs.max_documents }}"
          fi

          CHECKSUM_ARG=""
          if [ "${{ inputs.enrich_checksums }}" = "true" ]; then
            CHECKSUM_ARG="--enrich-checksums"
          fi

          python -m open_ris_monitor.pipeline.run \
            --municipality "${{ inputs.municipality }}" \
            --mode "${{ inputs.mode }}" \
            --limit "${{ inputs.limit }}" \
            --batch-size "${{ inputs.batch_size }}" \
            $MAX_DOCUMENTS_ARG \
            $CHECKSUM_ARG \
            --checksum-max-documents "${{ inputs.checksum_max_documents }}"

      - name: Generate public quality reports
        run: |
          python -m open_ris_monitor.analysis.generate_public_reports \
            --public-dir data/public

      - name: Show generated output
        run: |
          echo "Raw output:"
          find data/raw/latest -maxdepth 1 -type f -print
          echo "Public output:"
          find data/public -maxdepth 1 -type f -print
          echo "Latest summary:"
          cat data/public/latest.json

      - name: Upload raw harvest output
        uses: actions/upload-artifact@v4
        with:
          name: raw-harvest-${{ inputs.municipality }}
          path: data/raw/latest/
          if-no-files-found: error
          retention-days: 7

      - name: Upload public export output
        uses: actions/upload-artifact@v4
        with:
          name: public-export-${{ inputs.municipality }}
          path: data/public/
          if-no-files-found: error
          retention-days: 7

      - name: Commit public export output
        if: ${{ inputs.commit_public == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/
          git diff --cached --quiet || git commit -m "Update public RIS data for ${{ inputs.municipality }}"
          git push
