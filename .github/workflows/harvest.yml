name: Harvest

on:
  schedule:
    # Daily public refresh. The non-hourly minute reduces synchronized fork traffic.
    - cron: "23 3 * * *"
    # Monthly full backfill. Forks should choose their own non-hourly minute.
    - cron: "41 3 1 * *"
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      profile:
        description: Harvest profile to run
        required: true
        default: public
        type: choice
        options:
          - quick
          - public
          - backfill
      mode:
        description: Optional explicit mode override, latest or full. Leave empty to use the profile default.
        required: false
        default: ""
        type: choice
        options:
          - ""
          - latest
          - full
      limit:
        description: Optional explicit latest limit. Leave empty to use the profile default.
        required: false
        default: ""
      batch_size:
        description: Optional explicit full-harvest batch size. Leave empty to use the profile default.
        required: false
        default: ""
      max_documents:
        description: Optional maximum documents for full harvest. Leave empty to use the profile default.
        required: false
        default: ""
      enrich_checksums:
        description: Temporarily download selected PDFs and calculate SHA-256 checksums
        required: true
        default: false
        type: boolean
      checksum_max_documents:
        description: Maximum documents to checksum in this run
        required: true
        default: "50"
      commit_public:
        description: Commit generated data/public output back to the branch
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: public-harvest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve harvest inputs
        id: harvest-inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_MUNICIPALITY: ${{ inputs.municipality }}
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_BATCH_SIZE: ${{ inputs.batch_size }}
          INPUT_MAX_DOCUMENTS: ${{ inputs.max_documents }}
          INPUT_ENRICH_CHECKSUMS: ${{ inputs.enrich_checksums }}
          INPUT_CHECKSUM_MAX_DOCUMENTS: ${{ inputs.checksum_max_documents }}
          INPUT_COMMIT_PUBLIC: ${{ inputs.commit_public }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            municipality="huizen"
            enrich_checksums="false"
            checksum_max_documents="50"
            commit_public="true"

            if [ "$EVENT_SCHEDULE" = "41 3 1 * *" ]; then
              profile="backfill"
            else
              profile="public"
            fi

            mode=""
            limit=""
            batch_size=""
            max_documents=""
          else
            municipality="$INPUT_MUNICIPALITY"
            profile="$INPUT_PROFILE"
            mode="$INPUT_MODE"
            limit="$INPUT_LIMIT"
            batch_size="$INPUT_BATCH_SIZE"
            max_documents="$INPUT_MAX_DOCUMENTS"
            enrich_checksums="$INPUT_ENRICH_CHECKSUMS"
            checksum_max_documents="$INPUT_CHECKSUM_MAX_DOCUMENTS"
            commit_public="$INPUT_COMMIT_PUBLIC"
          fi

          {
            echo "municipality=$municipality"
            echo "profile=$profile"
            echo "mode=$mode"
            echo "limit=$limit"
            echo "batch_size=$batch_size"
            echo "max_documents=$max_documents"
            echo "enrich_checksums=$enrich_checksums"
            echo "checksum_max_documents=$checksum_max_documents"
            echo "commit_public=$commit_public"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved harvest profile: $profile"
          echo "Resolved municipality: $municipality"
          echo "Commit public output: $commit_public"

      - name: Run harvest and public export
        run: |
          PROFILE_ARG="--profile ${{ steps.harvest-inputs.outputs.profile }}"
          MODE_ARG=""
          LIMIT_ARG=""
          BATCH_SIZE_ARG=""
          MAX_DOCUMENTS_ARG=""
          CHECKSUM_ARG=""

          if [ -n "${{ steps.harvest-inputs.outputs.mode }}" ]; then
            MODE_ARG="--mode ${{ steps.harvest-inputs.outputs.mode }}"
          fi

          if [ -n "${{ steps.harvest-inputs.outputs.limit }}" ]; then
            LIMIT_ARG="--limit ${{ steps.harvest-inputs.outputs.limit }}"
          fi

          if [ -n "${{ steps.harvest-inputs.outputs.batch_size }}" ]; then
            BATCH_SIZE_ARG="--batch-size ${{ steps.harvest-inputs.outputs.batch_size }}"
          fi

          if [ -n "${{ steps.harvest-inputs.outputs.max_documents }}" ]; then
            MAX_DOCUMENTS_ARG="--max-documents ${{ steps.harvest-inputs.outputs.max_documents }}"
          fi

          if [ "${{ steps.harvest-inputs.outputs.enrich_checksums }}" = "true" ]; then
            CHECKSUM_ARG="--enrich-checksums"
          fi

          python -m open_ris_monitor.pipeline.run \
            --municipality "${{ steps.harvest-inputs.outputs.municipality }}" \
            $PROFILE_ARG \
            $MODE_ARG \
            $LIMIT_ARG \
            $BATCH_SIZE_ARG \
            $MAX_DOCUMENTS_ARG \
            $CHECKSUM_ARG \
            --checksum-max-documents "${{ steps.harvest-inputs.outputs.checksum_max_documents }}"

      - name: Generate public quality reports
        run: |
          python -m open_ris_monitor.analysis.generate_public_reports \
            --public-dir data/public

      - name: Show generated output
        run: |
          echo "Raw output:"
          find data/raw/latest -maxdepth 1 -type f -print
          echo "Public output:"
          find data/public -maxdepth 1 -type f -print
          echo "Latest summary:"
          cat data/public/latest.json

      - name: Upload raw harvest output
        uses: actions/upload-artifact@v4
        with:
          name: raw-harvest-${{ steps.harvest-inputs.outputs.municipality }}
          path: data/raw/latest/
          if-no-files-found: error
          retention-days: 7

      - name: Upload public export output
        uses: actions/upload-artifact@v4
        with:
          name: public-export-${{ steps.harvest-inputs.outputs.municipality }}
          path: data/public/
          if-no-files-found: error
          retention-days: 7

      - name: Commit public export output
        if: ${{ steps.harvest-inputs.outputs.commit_public == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/
          git diff --cached --quiet || git commit -m "Update public RIS data for ${{ steps.harvest-inputs.outputs.municipality }}"
          git push
