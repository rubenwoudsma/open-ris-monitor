name: Harvest

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      profile:
        description: Harvest profile
        required: true
        default: public
        type: choice
        options:
          - quick
          - public
          - backfill
      enrich_checksums:
        description: Temporarily download selected PDFs and calculate SHA-256 checksums
        required: true
        default: false
        type: boolean
      checksum_max_documents:
        description: Maximum documents to checksum in this run
        required: true
        default: "50"
      commit_public:
        description: Commit generated data/public output back to the branch
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: harvest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Resolve harvest options
        id: options
        run: |
          MUNICIPALITY="${{ inputs.municipality }}"
          PROFILE="${{ inputs.profile }}"
          ENRICH_CHECKSUMS="${{ inputs.enrich_checksums }}"
          CHECKSUM_MAX_DOCUMENTS="${{ inputs.checksum_max_documents }}"

          if [ -z "$MUNICIPALITY" ]; then
            MUNICIPALITY="huizen"
          fi

          if [ -z "$PROFILE" ]; then
            PROFILE="public"
          fi

          if [ -z "$ENRICH_CHECKSUMS" ]; then
            ENRICH_CHECKSUMS="false"
          fi

          if [ -z "$CHECKSUM_MAX_DOCUMENTS" ]; then
            CHECKSUM_MAX_DOCUMENTS="50"
          fi

          echo "municipality=$MUNICIPALITY" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "enrich_checksums=$ENRICH_CHECKSUMS" >> "$GITHUB_OUTPUT"
          echo "checksum_max_documents=$CHECKSUM_MAX_DOCUMENTS" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run harvest and public export
        env:
          MUNICIPALITY: ${{ steps.options.outputs.municipality }}
          PROFILE: ${{ steps.options.outputs.profile }}
          ENRICH_CHECKSUMS: ${{ steps.options.outputs.enrich_checksums }}
          CHECKSUM_MAX_DOCUMENTS: ${{ steps.options.outputs.checksum_max_documents }}
        run: |
          CHECKSUM_ARG=""
          if [ "$ENRICH_CHECKSUMS" = "true" ]; then
            CHECKSUM_ARG="--enrich-checksums"
          fi

          python -m open_ris_monitor.pipeline.run \
            --municipality "$MUNICIPALITY" \
            --profile "$PROFILE" \
            $CHECKSUM_ARG \
            --checksum-max-documents "$CHECKSUM_MAX_DOCUMENTS"

      - name: Generate public quality reports
        run: |
          python -m open_ris_monitor.analysis.generate_public_reports \
            --public-dir data/public

      - name: Show generated output
        run: |
          echo "Raw output:"
          find data/raw/latest -maxdepth 1 -type f -print
          echo "Public output:"
          find data/public -maxdepth 1 -type f -print
          echo "Latest summary:"
          cat data/public/latest.json

      - name: Upload raw harvest output
        uses: actions/upload-artifact@v4
        with:
          name: raw-harvest-${{ steps.options.outputs.municipality }}
          path: data/raw/latest/
          if-no-files-found: error
          retention-days: 7

      - name: Upload public export output
        uses: actions/upload-artifact@v4
        with:
          name: public-export-${{ steps.options.outputs.municipality }}
          path: data/public/
          if-no-files-found: error
          retention-days: 7

      - name: Commit public export output
        if: ${{ github.event_name == 'schedule' || inputs.commit_public == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/
          git diff --cached --quiet || git commit -m "Update public RIS data for ${{ steps.options.outputs.municipality }}"
          git push

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Harvest run"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Municipality: ${{ steps.options.outputs.municipality }}"
            echo "- Profile: ${{ steps.options.outputs.profile }}"
            echo "- Commit public output: ${{ github.event_name == 'schedule' || inputs.commit_public == true }}"
            echo "- Checksum enrichment: ${{ steps.options.outputs.enrich_checksums }}"
          } >> "$GITHUB_STEP_SUMMARY"
