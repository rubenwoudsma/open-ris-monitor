name: Harvest

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      limit:
        description: Number of latest documents to fetch
        required: true
        default: "25"

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run metadata-only harvest
        run: |
          python -m open_ris_monitor.pipeline.run \
            --municipality "${{ inputs.municipality }}" \
            --limit "${{ inputs.limit }}"

      - name: Upload raw harvest output
        uses: actions/upload-artifact@v4
        with:
          name: raw-harvest-${{ inputs.municipality }}
          path: data/raw/latest/
          if-no-files-found: error
          retention-days: 7
