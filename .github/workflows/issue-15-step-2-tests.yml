name: Issue 15 Step 2 Tests

on:
  workflow_dispatch:
  push:
    branches:
      - issue-15-meeting-document-relations
    paths:
      - "src/open_ris_monitor/pipeline/relations.py"
      - "src/open_ris_monitor/pipeline/run.py"
      - "tests/test_relation_harvest.py"
      - ".github/workflows/issue-15-step-2-tests.yml"

jobs:
  test:
    name: Run raw relation harvest tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run focused tests for issue 15 step 2
        run: |
          python -m pytest \
            tests/test_gemeenteoplossingen_connector.py \
            tests/test_gemeenteoplossingen_pagination.py \
            tests/test_connector.py \
            tests/test_gemeenteoplossingen_meeting_endpoints.py \
            tests/test_relation_harvest.py
