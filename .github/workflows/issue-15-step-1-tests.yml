name: Issue 15 Step 1 Tests

on:
  workflow_dispatch:
  push:
    branches:
      - issue-15-meeting-document-relations
    paths:
      - "src/open_ris_monitor/connectors/gemeenteoplossingen.py"
      - "tests/test_gemeenteoplossingen_meeting_endpoints.py"
      - ".github/workflows/issue-15-step-1-tests.yml"

jobs:
  test:
    name: Run connector endpoint tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run focused tests for issue 15 step 1
        run: |
          python -m pytest \
            tests/test_gemeenteoplossingen_connector.py \
            tests/test_gemeenteoplossingen_pagination.py \
            tests/test_connector.py \
            tests/test_gemeenteoplossingen_meeting_endpoints.py
