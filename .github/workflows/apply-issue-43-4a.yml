name: Apply issue 43.4a compact meetings view

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-issue-43-4a:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply compact meetings view patch
        run: python apply_issue_43_4a.py

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Run targeted viewer tests
        run: pytest tests/test_site_viewer_static.py

      - name: Run full test suite
        run: pytest

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html site/src/main.ts site/assets/styles.css site/assets/build/main.js tests/test_site_viewer_static.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat(site): add compact meetings view"
            git push
          fi
