name: Discover RIS Relations

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      meeting_limit:
        description: Number of meetings to sample
        required: true
        default: "3"
      item_limit:
        description: Number of meeting items or documents to sample per endpoint
        required: true
        default: "5"
      commit_report:
        description: Commit relation discovery report to data/public/quality
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  # Serialize optional public quality report commits with the harvest workflow.
  group: public-ris-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover-relations:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run targeted relation discovery
        run: |
          python -m open_ris_monitor.analysis.gemeenteoplossingen_relation_discovery \
            --municipality "${{ inputs.municipality }}" \
            --meeting-limit "${{ inputs.meeting_limit }}" \
            --item-limit "${{ inputs.item_limit }}" \
            --output data/public/quality/gemeenteoplossingen_relation_discovery.json

      - name: Show relation discovery summary
        run: |
          cat data/public/quality/gemeenteoplossingen_relation_discovery.json

      - name: Upload relation discovery report
        uses: actions/upload-artifact@v4
        with:
          name: ris-relation-discovery-${{ inputs.municipality }}
          path: data/public/quality/gemeenteoplossingen_relation_discovery.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit relation discovery report
        if: ${{ inputs.commit_report }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/quality/gemeenteoplossingen_relation_discovery.json
          if git diff --cached --quiet; then
            echo "No relation discovery report changes to commit."
          else
            git commit -m "Update GemeenteOplossingen relation discovery report"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            for attempt in 1 2; do
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                exit 0
              fi
              echo "Push failed, rebasing before retry ${attempt}."
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            done
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
