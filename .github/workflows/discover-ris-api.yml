name: Discover RIS API

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      limit:
        description: Number of sample records to request per endpoint
        required: true
        default: "3"
      endpoints:
        description: Optional comma-separated endpoint list. Leave empty for defaults.
        required: false
        default: ""
      commit_report:
        description: Commit discovery report to data/public/quality
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run endpoint discovery
        run: |
          python -m open_ris_monitor.analysis.gemeenteoplossingen_discovery \
            --municipality "${{ inputs.municipality }}" \
            --limit "${{ inputs.limit }}" \
            --endpoints "${{ inputs.endpoints }}" \
            --output data/public/quality/gemeenteoplossingen_endpoint_discovery.json

      - name: Show discovery summary
        run: |
          cat data/public/quality/gemeenteoplossingen_endpoint_discovery.json

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: ris-api-discovery-${{ inputs.municipality }}
          path: data/public/quality/gemeenteoplossingen_endpoint_discovery.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit discovery report
        if: ${{ inputs.commit_report }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/public/quality/gemeenteoplossingen_endpoint_discovery.json
          git diff --cached --quiet || git commit -m "Update GemeenteOplossingen discovery report"
          git push
