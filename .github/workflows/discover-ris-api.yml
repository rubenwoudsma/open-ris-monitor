name: Discover RIS API

on:
  workflow_dispatch:
    inputs:
      municipality:
        description: Municipality config slug
        required: true
        default: huizen
      limit:
        description: Number of records to request per candidate endpoint
        required: true
        default: "3"
      endpoints:
        description: Optional comma-separated endpoint list. Leave empty for default candidates.
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Probe candidate endpoints
        run: |
          python -m open_ris_monitor.analysis.gemeenteoplossingen_discovery \
            --municipality "${{ inputs.municipality }}" \
            --limit "${{ inputs.limit }}" \
            --endpoints "${{ inputs.endpoints }}" \
            --output data/public/quality/gemeenteoplossingen_endpoint_discovery.json

      - name: Show discovery summary
        run: |
          cat data/public/quality/gemeenteoplossingen_endpoint_discovery.json

      - name: Upload discovery report
        uses: actions/upload-artifact@v4
        with:
          name: ris-api-discovery-${{ inputs.municipality }}
          path: data/public/quality/gemeenteoplossingen_endpoint_discovery.json
          if-no-files-found: error
          retention-days: 14
